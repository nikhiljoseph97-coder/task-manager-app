<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Task Manager</h1>

    <form id="taskForm" class="task-form">
      <input id="taskInput" type="text" placeholder="Add a new task..." autocomplete="off" />
      <button type="submit">Add</button>
    </form>

    <section class="controls">
      <button id="filterAll" class="active" type="button">All</button>
      <button id="filterActive" type="button">Active</button>
      <button id="filterCompleted" type="button">Completed</button>
      <button id="clearCompleted" type="button">Clear Completed</button>
    </section>

    <ul id="taskList" class="task-list"></ul>

    <p id="taskCount" class="task-count"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
